spring:
  application:
    name: api-service

  flyway:
    enabled: true
    locations: classpath:db/migration

  datasource:
    url: jdbc:postgresql://localhost:5433/${POSTGRES_DB:job_platform}
    username: ${POSTGRES_USER:job_user}
    password: ${POSTGRES_PASSWORD:job_password}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  kafka:
    bootstrap-servers: localhost:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        spring.json.add.type.headers: false

server:
  port: 8080

logging:
  pattern:
    console: "%d{yyyy-MM-dd'T'HH:mm:ss.SSSXXX} %-5level [%thread] %logger{36} - %msg%n"
  level:
    root: INFO
    # Application code: DEBUG helps trace job lifecycle while troubleshooting.
    com.distributedjob: DEBUG
    # Reduce noise from infrastructure
    org.apache.kafka.clients: WARN
    org.apache.kafka.common.network: WARN

job:
  callback:
    secret: ${CALLBACK_SECRET:}
