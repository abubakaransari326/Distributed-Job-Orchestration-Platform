spring:
  application:
    name: api-service

  datasource:
    url: jdbc:postgresql://localhost:5432/${POSTGRES_DB:job_platform}
    username: ${POSTGRES_USER:job_user}
    password: ${POSTGRES_PASSWORD:job_password}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  kafka:
    bootstrap-servers: localhost:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        spring.json.add.type.headers: false

server:
  port: 8080
